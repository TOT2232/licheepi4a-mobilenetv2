name: Lichee Pi 4A MobilenetV2 CI 

on:
  push:
    paths:
      - 'th1520_npu/onnx_mobilenetv2_c++/**'
      - '.github/workflows/mobilenetv2_ci.yml'
  pull_request:
    paths:
      - 'th1520_npu/onnx_mobilenetv2_c++/**'
  workflow_dispatch:

env:
  HHB_IMAGE: hhb4tools/hhb:2.6.17
  RUYI_VERSION: "0.47.0"
  EXAMPLE_DIR: th1520_npu/onnx_mobilenetv2_c++

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget git curl ca-certificates

      - name: Check required files
        run: |
          test -f ${EXAMPLE_DIR}/main.cpp
          test -f ${EXAMPLE_DIR}/mobilenetv2-12.onnx
          test -f ${EXAMPLE_DIR}/persian_cat.jpg
          test -f ${EXAMPLE_DIR}/synset.txt

      - name: Pull HHB Docker image
        run: docker pull ${HHB_IMAGE}

      - name: Clone OpenCV dependency
        run: |
          cd th1520_npu
          git clone https://github.com/zhangwm-pt/prebuilt_opencv.git

      - name: Run HHB conversion
        run: |
          docker run --rm \
            -v ${GITHUB_WORKSPACE}/th1520_npu:/home/example/th1520_npu \
            ${HHB_IMAGE} \
            bash -lc '
              cd /home/example/th1520_npu/onnx_mobilenetv2_c++ &&
              hhb -D \
                --model-file mobilenetv2-12.onnx \
                --data-scale 0.017 \
                --data-mean "124 117 104" \
                --board th1520 \
                --postprocess save_and_top5 \
                --input-name "input" \
                --output-name "output" \
                --input-shape "1 3 224 224" \
                --calibrate-dataset persian_cat.jpg \
                --quantization-scheme "int8_asym"
            '

      - name: Install RuyiSDK
        run: |
          wget https://mirror.iscas.ac.cn/ruyisdk/ruyi/tags/${RUYI_VERSION}/ruyi-${RUYI_VERSION}.amd64
          chmod +x ruyi-${RUYI_VERSION}.amd64
          sudo mv ruyi-${RUYI_VERSION}.amd64 /usr/local/bin/ruyi
          ruyi update
          ruyi install gnu-plct-xthead

      - name: Create Ruyi env
        run: |
          ruyi venv -t gnu-plct-xthead sipeed-lpi4a ruyi-venv

      - name: Cross compile
        run: |
          source ruyi-venv/bin/ruyi-activate
          cd ${EXAMPLE_DIR}

          riscv64-plctxthead-linux-gnu-g++ \
            main.cpp \
            -I../prebuilt_opencv/include/opencv4 \
            -L../prebuilt_opencv/lib \
            -L../prebuilt_opencv/lib/opencv4/3rdparty \
            -lopencv_imgproc -lopencv_imgcodecs -lopencv_core \
            -llibjpeg-turbo -llibwebp -llibpng -llibtiff -llibopenjp2 \
            -lzlib -lcsi_cv -latomic -ldl -lpthread -lrt \
            -o mobilenetv2_example_ruyi

      - name: Verify outputs
        run: |
          echo "Generated files:"
          find ${EXAMPLE_DIR} -maxdepth 3 -type f | sort
          test -f ${EXAMPLE_DIR}/mobilenetv2_example_ruyi
          test -f ${EXAMPLE_DIR}/hhb_out/hhb.bm
          test -f ${EXAMPLE_DIR}/hhb_out/model.params
          
          file ${EXAMPLE_DIR}/mobilenetv2_example_ruyi | grep -i "risc-v"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobilenetv2-build
          path: th1520_npu/onnx_mobilenetv2_c++/
