name: YOLOv5n C920 Build CI

on:
  push:
    paths:
      - 'th1520_cpu/yolov5n/**'
      - '.github/workflows/yolov5n_ci.yml'
  pull_request:
    paths:
      - 'th1520_cpu/yolov5n/**'
      - '.github/workflows/yolov5n_ci.yml'
  workflow_dispatch:

env:
  HHB_IMAGE: hhb4tools/hhb:2.6.17
  RUYI_VERSION: "0.47.0"
  DEMO_DIR: th1520_cpu/yolov5n

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y wget git curl

    - name: Pull HHB Image
      run: docker pull $HHB_IMAGE

    - name: Export ONNX & HHB Compile
      run: |
        docker run --rm -v $PWD:/workspace $HHB_IMAGE bash -lc "
          set -e
          cd /workspace/$DEMO_DIR

          pip install torch==2.0.1 torchvision==0.15.2
          pip install ultralytics opencv-python-headless pandas tqdm seaborn
          git clone https://github.com/ultralytics/yolov5.git
          cd yolov5
          sed -i '1i# -*- coding: utf-8 -*-' export.py
          python3 export.py --weights yolov5n.pt --include onnx --imgsz 384 640
          cp yolov5n.onnx ..
          cd ..

          hhb -D \
            --model-file yolov5n.onnx \
            --data-scale-div 255 \
            --board c920 \
            --input-name images \
            --output-name \"/model.24/m.0/Conv_output_0;/model.24/m.1/Conv_output_0;/model.24/m.2/Conv_output_0\" \
            --input-shape \"1 3 384 640\" \
            --quantization-scheme float16

          mkdir -p /workspace/hhb_libs
          cp -r /usr/local/lib/python3.8/dist-packages/hhb/install_nn2/c920 /workspace/hhb_libs/hhb_c920
          cp -r /usr/local/lib/python3.8/dist-packages/hhb/prebuilt/runtime/riscv_linux /workspace/hhb_libs/hhb_runtime
          cp -r /usr/local/lib/python3.8/dist-packages/hhb/prebuilt/decode/install/lib/rv /workspace/hhb_libs/hhb_decode_lib

          cp /usr/lib/gcc/x86_64-linux-gnu/9/include/omp.h /workspace/omp.h
        "

    - name: Install RuyiSDK
      run: |
        wget https://mirror.iscas.ac.cn/ruyisdk/ruyi/tags/${RUYI_VERSION}/ruyi-${RUYI_VERSION}.amd64
        chmod +x ruyi-${RUYI_VERSION}.amd64
        sudo mv ruyi-${RUYI_VERSION}.amd64 /usr/local/bin/ruyi
        ruyi update
        ruyi install gnu-plct-xthead

    - name: Create Ruyi Env
      run: ruyi venv -t gnu-plct-xthead sipeed-lpi4a ruyi-venv

    - name: Cross Compile
      run: |
        set -e
        source ruyi-venv/bin/ruyi-activate

        cd $DEMO_DIR

        # 修复函数名（必须）
        sed -i 's/shl_ref_f32_to_input_dtype/shl_c920_f32_to_input_dtype/g' yolov5n.c

        # 拷 omp.h
        cp ../../omp.h .

        riscv64-plctxthead-linux-gnu-gcc \
          yolov5n.c \
          -o yolov5n_example \
          hhb_out/io.c \
          hhb_out/model.c \
          -Wl,--gc-sections \
          -O2 -g \
          -mabi=lp64d \
          -I . \
          -I hhb_out/ \
          -I ../hhb_libs/hhb_c920/include/ \
          -I ../hhb_libs/hhb_c920/include/shl_public/ \
          -I ../hhb_libs/hhb_c920/include/csinn/ \
          -L ../hhb_libs/hhb_c920/lib/ \
          -lshl \
          -L ../hhb_libs/hhb_decode_lib/ \
          -L ../hhb_libs/hhb_runtime/ \
          -lprebuilt_runtime \
          -ljpeg -lpng -lz -lstdc++ -lm \
          -march=rv64gcv0p7_zfh_xtheadc \
          -Wl,-unresolved-symbols=ignore-in-shared-libs

    - name: Verify Build
      run: |
        file $DEMO_DIR/yolov5n_example | grep -i "risc-v"
        ls -lh $DEMO_DIR/yolov5n_example

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: yolov5n-c920-runtime
        path: |
          ${{ env.DEMO_DIR }}/yolov5n_example
          ${{ env.DEMO_DIR }}/hhb_out/
          ${{ env.DEMO_DIR }}/inference.py
          ${{ env.DEMO_DIR }}/coco.names
          ${{ env.DEMO_DIR }}/kite.jpg
